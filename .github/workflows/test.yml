name: tests

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
        include:
          # Cross-platform spot-check on the latest stable Python.
          - os: macos-latest
            python-version: '3.12'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js (for JS engine + bundle tests)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Show versions
        run: |
          python --version
          node --version
          python -c "import gridlang; print('gridlang', gridlang.__version__)"

      # The repo's own no-pytest harness drives the same 442-test suite that
      # tests/_run_no_pytest.py runs locally. We use it on CI too so the suite
      # stays runnable in environments where pytest itself is broken (the
      # harness was originally added because the local Python lacked _ssl).
      - name: Run test suite
        run: python tests/_run_no_pytest.py

      # Sanity-check the CLI by running every published example.
      - name: Smoke-test CLI on examples
        run: |
          for f in examples/*.grid; do
            echo "── $f ──"
            python -m gridlang.cli validate "$f"
          done

      # Confirm the JS bundle command produces a runnable Node bundle.
      - name: Verify js-bundle round-trip
        run: |
          python -m gridlang.cli js-bundle examples/10_javascript.grid -o /tmp/bundle.js
          node /tmp/bundle.js | python -c "import json, sys; d = json.load(sys.stdin); assert d.get('error') is None, d; print('bundle OK; aggregates =', d.get('aggregates'))"
